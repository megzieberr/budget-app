name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Public Supabase client values (safe to expose — protected by RLS + your
      # password). They must be present at build time so Vite can inline them.
      VITE_SUPABASE_URL: https://coshdbiokwrkyjsnmtph.supabase.co
      VITE_SUPABASE_ANON_KEY: sb_publishable_A2e72cZ4ib1ZVfZO-7mafg_Izho3JFS
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
